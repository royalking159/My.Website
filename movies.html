<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StreamHub - Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar" id="mainSidebar">
        <button class="menu-toggle" onclick="toggleSidebar()">☰ <span class="logo-text">StreamHub</span></button>
        <a href="home.html">🏠 <span class="nav-text">Home</span></a>
        <a href="movies.html" class="active">🎬 <span class="nav-text">Discover Library</span></a>
        <div class="spacer"></div>
        <a href="socials.html">📱 <span class="nav-text">Social Channels</span></a>
    </div>

    <div class="main-content">
        <div class="header-search">
            <button class="btn-back" onclick="history.back()" style="margin-bottom:0;">⬅ Back</button>
            <div class="search-input-wrapper">
                <input type="text" id="catalogSearch" placeholder="Search library workspace..." onkeyup="filterLibrary()">
            </div>
        </div>

        <h2 class="row-title">Full Streaming Catalog</h2>
        <div class="stremio-grid" id="full-library-grid" style="margin-top: 20px;">
            <!-- Rendered dynamically -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
