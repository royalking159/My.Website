<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StreamHub - Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar" id="mainSidebar">
        <button class="menu-toggle" onclick="toggleSidebar()">
            <span class="logo-icon">☰</span><span class="logo-text">StreamHub</span>
        </button>
        <a href="home.html">
            <span class="nav-icon">🏠</span><span class="nav-text">Home</span>
        </a>
        <a href="movies.html" class="active">
            <span class="nav-icon">🎬</span><span class="nav-text">Discover Library</span>
        </a>
        <div class="spacer"></div>
        <a href="socials.html">
            <span class="nav-icon">📱</span><span class="nav-text">Social Channels</span>
        </a>
    </div>

    <div class="main-content">
        <div class="header-search">
            <h2 class="row-title" style="margin: 0;">Discover Catalog</h2>
            <div class="search-input-wrapper">
                <input type="text" id="catalogSearch" placeholder="Search library workspace..." onkeyup="filterLibrary()">
            </div>
        </div>

        <div class="row-title-container">
            <div class="row-title">All Series & Standalone Content</div>
        </div>
        <div class="stremio-grid" id="full-library-grid">
            <!-- Rendered dynamically from data.json values -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
