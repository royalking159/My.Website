<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StreamHub - Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Global Sliding Rail Menu -->
    <div class="sidebar" id="mainSidebar">
        <button class="menu-toggle" onclick="toggleSidebar()">
            <span class="logo-icon">☰</span><span class="logo-text">StreamHub</span>
        </button>
        <a href="home.html" class="active">
            <span class="nav-icon">🏠</span><span class="nav-text">Home</span>
        </a>
        <a href="movies.html">
            <span class="nav-icon">🎬</span><span class="nav-text">Discover Library</span>
        </a>
        <div class="spacer"></div>
        <a href="socials.html">
            <span class="nav-icon">📱</span><span class="nav-text">Social Channels</span>
        </a>
    </div>

    <!-- Content Workspace -->
    <div class="main-content" style="display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; min-height: 80vh;">
        <h1 style="font-size: 3.5rem; margin-bottom: 10px; color: #ffffff;">Welcome to <span style="color: var(--accent-purple);">StreamHub</span></h1>
        <p style="color: var(--text-secondary); font-size: 1.2rem; max-width: 600px; margin-bottom: 40px; line-height: 1.6;">
            Your unified private media index tracking localized libraries, specialized episode structures, and cinematic background rendering assets.
        </p>
        <a href="movies.html" style="background: var(--accent-purple); color: white; text-decoration: none; padding: 16px 40px; font-size: 1.1rem; font-weight: bold; border-radius: 30px; box-shadow: 0 4px 20px rgba(112, 71, 235, 0.4); transition: transform 0.2s, background 0.2s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
            🎬 Go to Movies & Shows
        </a>
    </div>

    <script src="script.js"></script>
</body>
</html>
