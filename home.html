<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StreamHub - Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Global Sliding Rail Menu -->
    <div class="sidebar" id="mainSidebar">
        <button class="menu-toggle" onclick="toggleSidebar()">
            <span class="logo-icon">☰</span><span class="logo-text">StreamHub</span>
        </button>
        <a href="home.html" class="active">
            <span class="nav-icon">🏠</span><span class="nav-text">Home</span>
        </a>
        <a href="movies.html">
            <span class="nav-icon">🎬</span><span class="nav-text">Discover Library</span>
        </a>
        <div class="spacer"></div>
        <a href="socials.html">
            <span class="nav-icon">📱</span><span class="nav-text">Social Channels</span>
        </a>
    </div>

    <!-- Content Workspace -->
    <div class="main-content">
        <div class="header-search">
            <h2>Discover</h2>
            <div class="search-input-wrapper">
                <input type="text" placeholder="Search movies or shows...">
            </div>
        </div>

        <!-- Featured Library Rows directly bound to single valid data collection -->
        <div class="row-title-container">
            <div class="row-title">Popular Series</div>
            <a href="movies.html" class="see-all">See All ❯</a>
        </div>
        <div class="stremio-grid" id="popular-catalog-grid">
            <!-- Rendered Dyn via Script matching data.json entries -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
